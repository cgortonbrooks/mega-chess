<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background tile -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#1a0a0a"/>
  <rect x="0" y="0" width="64" height="64" rx="10" fill="none" stroke="#8B1A1A" stroke-width="1.5"/>
  <!-- Base platform -->
  <rect x="9" y="54" width="46" height="7" rx="3" fill="#CC2222"/>
  <!-- Stem -->
  <rect x="21" y="30" width="22" height="26" rx="3" fill="#CC2222"/>
  <!-- Neck -->
  <rect x="24" y="25" width="16" height="8" rx="2" fill="#AA1111"/>
  <!-- Head -->
  <ellipse cx="32" cy="20" rx="13" ry="12" fill="#CC2222"/>
  <!-- Crown points -->
  <polygon points="22,15 24,6 27,14" fill="#CC2222"/>
  <polygon points="29,13 32,4 35,13" fill="#CC2222"/>
  <polygon points="37,14 40,6 42,15" fill="#CC2222"/>
  <!-- Devil horns -->
  <path d="M20,13 Q13,6 16,0 Q17,7 21,11Z" fill="#8B1A1A"/>
  <path d="M44,13 Q51,6 48,0 Q47,7 43,11Z" fill="#8B1A1A"/>
  <!-- Eyes (golden slit pupils) -->
  <ellipse cx="25" cy="20" rx="4.5" ry="4" fill="#FFD700"/>
  <ellipse cx="39" cy="20" rx="4.5" ry="4" fill="#FFD700"/>
  <ellipse cx="25" cy="20" rx="1.5" ry="3.2" fill="#200000"/>
  <ellipse cx="39" cy="20" rx="1.5" ry="3.2" fill="#200000"/>
  <ellipse cx="25" cy="20" rx="4.5" ry="4" fill="none" stroke="#FF8800" stroke-width="0.8" opacity="0.8"/>
  <ellipse cx="39" cy="20" rx="4.5" ry="4" fill="none" stroke="#FF8800" stroke-width="0.8" opacity="0.8"/>
  <!-- Smirk -->
  <path d="M26,28 Q32,33 38,28" fill="none" stroke="#200000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fangs -->
  <polygon points="28,29 30,34 32,29" fill="#FFEECC"/>
  <polygon points="32,29 34,34 36,29" fill="#FFEECC"/>
  <!-- Crown cross -->
  <rect x="30" y="6" width="4" height="9" rx="1" fill="#FFD700"/>
  <rect x="28" y="8" width="8" height="3" rx="1" fill="#FFD700"/>
</svg>
