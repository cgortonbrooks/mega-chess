services:
  - type: web
    name: mega-chess
    runtime: node
    region: oregon
    plan: free
    repo: https://github.com/craiggorton/mega-chess
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
